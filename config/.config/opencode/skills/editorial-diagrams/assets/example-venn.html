<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Venn - Skill Set</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917; --muted: #57534e; --accent: #b5523a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', sans-serif; background: var(--paper); color: var(--ink); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 7px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 24px; }
    .diagram-container { background: var(--paper-2); border: 1px solid rgba(28,25,23,0.12); border-radius: 8px; padding: 24px; }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">VENN</p>
  <h1>Full-Stack Skills</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#f2ede4"/>
      
      <circle cx="140" cy="150" r="80" fill="rgba(37,99,235,0.1)" stroke="#2563eb" stroke-width="1.5"/>
      <text x="140" y="120" fill="#2563eb" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Frontend</text>
      <text x="140" y="230" fill="#2563eb" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">React, Vue, CSS</text>
      
      <circle cx="260" cy="150" r="80" fill="rgba(181,82,58,0.1)" stroke="#b5523a" stroke-width="1.5"/>
      <text x="260" y="120" fill="#b5523a" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Backend</text>
      <text x="260" y="230" fill="#b5523a" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Node, Go, SQL</text>
      
      <circle cx="200" cy="200" r="80" fill="rgba(28,25,23,0.08)" stroke="#1c1917" stroke-width="1.5"/>
      <text x="200" y="195" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">DevOps</text>
      <text x="200" y="230" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Docker, K8s, CI/CD</text>
      
      <text x="200" y="155" fill="#1c1917" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">T‑Shape</text>
    </svg>
  </div>
</body>
</html>
