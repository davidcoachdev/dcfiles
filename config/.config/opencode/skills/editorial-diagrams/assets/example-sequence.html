<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence - OAuth</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917; --muted: #57534e; --accent: #b5523a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 7px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 24px; }
    .diagram-container { background: var(--paper-2); border: 1px solid rgba(28,25,23,0.12); border-radius: 8px; padding: 24px; overflow-x: auto; width: 100%; max-width: 900px; }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">SEQUENCE</p>
  <h1>OAuth 2.0 Authorization Code Flow</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#57534e"/></marker></defs>
      <rect width="100%" height="100%" fill="#f2ede4"/>
      
      <rect x="80" y="20" width="80" height="36" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="120" y="43" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Client</text>
      <line x1="120" y1="56" x2="120" y2="340" stroke="#57534e" stroke-width="1" stroke-dasharray="4,3"/>
      
      <rect x="260" y="20" width="80" height="36" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="300" y="43" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Browser</text>
      <line x1="300" y1="56" x2="300" y2="340" stroke="#57534e" stroke-width="1" stroke-dasharray="4,3"/>
      
      <rect x="440" y="20" width="80" height="36" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="480" y="43" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Auth Srv</text>
      <line x1="480" y1="56" x2="480" y2="340" stroke="#57534e" stroke-width="1" stroke-dasharray="4,3"/>
      
      <rect x="600" y="20" width="80" height="36" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
      <text x="640" y="43" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">API</text>
      <line x1="640" y1="56" x2="640" y2="340" stroke="#57534e" stroke-width="1" stroke-dasharray="4,3"/>
      
      <path d="M120 80 L300 80" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="165" y="66" width="70" height="14" rx="2" fill="#faf7f2"/>
      <text x="200" y="76" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">GET /auth</text>
      
      <path d="M300 120 L480 120" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="355" y="106" width="80" height="14" rx="2" fill="#faf7f2"/>
      <text x="395" y="116" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Authorize</text>
      
      <path d="M480 160 L300 160" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
      <rect x="355" y="146" width="70" height="14" rx="2" fill="#faf7f2"/>
      <text x="390" y="156" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Login Form</text>
      
      <path d="M300 200 L480 200" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="355" y="186" width="60" height="14" rx="2" fill="#faf7f2"/>
      <text x="390" y="196" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Credentials</text>
      
      <path d="M480 240 L300 240" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
      <rect x="355" y="226" width="60" height="14" rx="2" fill="#faf7f2"/>
      <text x="390" y="236" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Code</text>
      
      <path d="M300 280 L120 280" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
      <rect x="175" y="266" width="60" height="14" rx="2" fill="#faf7f2"/>
      <text x="210" y="276" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Code</text>
      
      <path d="M120 320 L640 320" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="320" y="306" width="70" height="14" rx="2" fill="#faf7f2"/>
      <text x="380" y="316" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Token Req</text>
    </svg>
  </div>
</body>
</html>
