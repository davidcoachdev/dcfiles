<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swimlane - Order Process</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917; --muted: #57534e; --accent: #b5523a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 7px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 24px; }
    .diagram-container { background: var(--paper-2); border: 1px solid rgba(28,25,23,0.12); border-radius: 8px; padding: 24px; overflow-x: auto; }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">SWIMLANE</p>
  <h1>Order Processing Flow</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 650 320" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#57534e"/></marker></defs>
      <rect width="100%" height="100%" fill="#f2ede4"/>
      
      <rect x="0" y="40" width="130" height="60" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="65" y="75" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Customer</text>
      
      <rect x="130" y="40" width="130" height="60" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="195" y="75" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Frontend</text>
      
      <rect x="260" y="40" width="130" height="60" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="325" y="75" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Backend</text>
      
      <rect x="390" y="40" width="130" height="60" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
      <text x="455" y="75" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Payment</text>
      
      <rect x="520" y="40" width="130" height="60" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
      <text x="585" y="75" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Warehouse</text>
      
      <line x1="0" y1="100" x2="650" y2="100" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <line x1="0" y1="160" x2="650" y2="160" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <line x1="0" y1="220" x2="650" y2="220" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      
      <rect x="20" y="120" width="90" height="30" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="65" y="140" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Place Order</text>
      
      <rect x="145" y="120" width="90" height="30" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="190" y="140" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Validate</text>
      
      <rect x="275" y="120" width="90" height="30" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="320" y="140" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Process</text>
      
      <rect x="405" y="120" width="90" height="30" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="450" y="140" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Charge</text>
      
      <rect x="535" y="180" width="90" height="30" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="580" y="200" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Pick Pack</text>
      
      <path d="M110 135 L145 135" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M235 135 L275 135" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M365 135 L405 135" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M495 135 L520 135 L520 150 L535 150" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M580 150 L580 180" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
    </svg>
  </div>
</body>
</html>
