<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>State Machine - Order</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917; --muted: #57534e; --accent: #b5523a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 7px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 24px; }
    .diagram-container { background: var(--paper-2); border: 1px solid rgba(28,25,23,0.12); border-radius: 8px; padding: 24px; overflow-x: auto; }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">STATE MACHINE</p>
  <h1>Order Status Transitions</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 500 320" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#57534e"/></marker></defs>
      <rect width="100%" height="100%" fill="#f2ede4"/>
      
      <circle cx="60" cy="160" r="8" fill="#1c1917"/>
      <line x1="68" y1="160" x2="100" y2="160" stroke="#1c1917" stroke-width="1.5"/>
      
      <rect x="100" y="130" width="100" height="60" rx="8" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="150" y="165" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Pending</text>
      
      <rect x="260" y="130" width="100" height="60" rx="8" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="310" y="165" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Confirmed</text>
      
      <rect x="260" y="240" width="100" height="60" rx="8" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="310" y="275" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cancelled</text>
      
      <rect x="420" y="130" width="80" height="60" rx="8" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="460" y="165" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Shipped</text>
      
      <rect x="420" y="240" width="80" height="60" rx="8" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
      <text x="460" y="275" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Delivered</text>
      
      <path d="M200 160 L260 160" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <text x="230" y="150" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">pay</text>
      
      <path d="M310 190 L310 240" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <text x="320" y="220" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">[cancel]</text>
      
      <path d="M360 160 L420 160" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <text x="390" y="150" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">ship</text>
      
      <path d="M460 190 L460 240" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
      <text x="470" y="215" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">deliver</text>
      
      <path d="M150 130 L150 60 L310 60 L310 130" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
      <text x="230" y="50" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">timeout</text>
    </svg>
  </div>
</body>
</html>
