<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quadrant - Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917; --muted: #57534e; --accent: #b5523a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 7px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 24px; }
    .diagram-container { background: var(--paper-2); border: 1px solid rgba(28,25,23,0.12); border-radius: 8px; padding: 24px; overflow-x: auto; }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">QUADRANT</p>
  <h1>Q2 Projects — Impact vs Effort</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#f2ede4"/>
      <line x1="40" y1="40" x2="40" y2="280" stroke="#1c1917" stroke-width="2"/>
      <line x1="40" y1="280" x2="460" y2="280" stroke="#1c1917" stroke-width="2"/>
      <line x1="40" y1="160" x2="460" y2="160" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>
      <line x1="250" y1="40" x2="250" y2="280" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>
      
      <text x="20" y="160" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end" transform="rotate(-90, 20, 160)">IMPACT →</text>
      <text x="250" y="305" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">EFFORT →</text>
      
      <text x="145" y="100" fill="#1c1917" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">DO FIRST</text>
      <text x="355" y="100" fill="#1c1917" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">STRATEGIC</text>
      <text x="145" y="220" fill="#57534e" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">QUICK WINS</text>
      <text x="355" y="220" fill="#57534e" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">LATER</text>
      
      <rect x="100" y="60" width="80" height="32" rx="4" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="140" y="82" fill="#1c1917" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Auth v2</text>
      
      <rect x="200" y="80" width="80" height="32" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="240" y="102" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Mobile SDK</text>
      
      <rect x="300" y="60" width="80" height="32" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="340" y="82" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Dashboard</text>
      
      <rect x="380" y="100" width="70" height="28" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="415" y="118" fill="#1c1917" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">AI Search</text>
      
      <rect x="80" y="180" width="80" height="32" rx="4" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="120" y="202" fill="#1c1917" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Docs刷新</text>
      
      <rect x="180" y="200" width="70" height="28" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="215" y="218" fill="#1c1917" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">Bug Fixes</text>
      
      <rect x="280" y="190" width="80" height="32" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="320" y="212" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Analytics</text>
      
      <rect x="380" y="180" width="70" height="28" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="415" y="198" fill="#57534e" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">i18n</text>
      
      <rect x="100" y="240" width="70" height="28" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="135" y="258" fill="#57534e" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">CTA Fix</text>
      
      <rect x="200" y="230" width="80" height="32" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="240" y="252" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Dark Mode</text>
    </svg>
  </div>
</body>
</html>
