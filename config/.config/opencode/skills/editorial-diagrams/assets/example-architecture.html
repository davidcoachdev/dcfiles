<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #faf7f2;
      --paper-2: #f2ede4;
      --ink: #1c1917;
      --muted: #57534e;
      --soft: #78716c;
      --rule: rgba(28,25,23,0.12);
      --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08);
      --link: #2563eb;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Geist', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      margin-bottom: 24px;
    }
    .diagram-container {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 24px;
      overflow-x: auto;
      width: 100%;
      max-width: 900px;
    }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">ARCHITECTURE</p>
  <h1>System Architecture</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
      </defs>
      <rect width="100%" height="100%" fill="#f2ede4"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>
      
      <line x1="40" y1="40" x2="760" y2="40" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="760" y="32" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.1em">PUBLIC</text>
      
      <line x1="40" y1="140" x2="760" y2="140" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="760" y="132" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.1em">APPLICATION</text>
      
      <line x1="40" y1="240" x2="760" y2="240" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="760" y="232" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.1em">DATA</text>
      
      <rect x="80" y="60" width="100" height="60" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="130" y="95" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Browser</text>
      
      <rect x="80" y="160" width="100" height="60" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="130" y="195" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">API Gateway</text>
      <text x="130" y="210" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">:443</text>
      
      <rect x="240" y="160" width="100" height="60" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="290" y="195" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Auth Service</text>
      <text x="290" y="210" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">JWT</text>
      
      <rect x="400" y="160" width="100" height="60" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="450" y="195" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">App Server</text>
      <text x="450" y="210" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Node.js</text>
      
      <rect x="560" y="160" width="100" height="60" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
      <text x="610" y="195" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cache</text>
      <text x="610" y="210" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Redis</text>
      
      <rect x="240" y="260" width="100" height="50" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
      <text x="290" y="290" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">PostgreSQL</text>
      
      <rect x="400" y="260" width="100" height="50" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="450" y="290" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">S3</text>
      
      <path d="M130 120 L130 160" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M180 190 L240 190" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M290 220 L290 260" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M450 220 L450 260" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M340 190 L400 190" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M500 190 L560 190" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M610 220 L610 260" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M500 160 L560 160" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
      
      <line x1="40" y1="280" x2="760" y2="280" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
      <text x="40" y="296" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>
    </svg>
  </div>
</body>
</html>
