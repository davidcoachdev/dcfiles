<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Layers - Tech Stack</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917; --muted: #57534e; --accent: #b5523a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', sans-serif; background: var(--paper); color: var(--ink); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 7px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 24px; }
    .diagram-container { background: var(--paper-2); border: 1px solid rgba(28,25,23,0.12); border-radius: 8px; padding: 24px; }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">LAYERS</p>
  <h1>Technology Stack</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#f2ede4"/>
      
      <rect x="40" y="30" width="420" height="40" rx="6" fill="#1c1917"/>
      <text x="250" y="56" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Presentation Layer</text>
      <text x="440" y="56" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">React, Vue, Angular</text>
      
      <rect x="40" y="80" width="420" height="40" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="250" y="106" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Application Layer</text>
      <text x="440" y="106" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">Node.js, Python, Go</text>
      
      <rect x="40" y="130" width="420" height="40" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="250" y="156" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Domain Layer</text>
      <text x="440" y="156" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">Business Logic, Entities</text>
      
      <rect x="40" y="180" width="420" height="40" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="250" y="206" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Infrastructure Layer</text>
      <text x="440" y="206" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">PostgreSQL, Redis, S3</text>
      
      <rect x="40" y="230" width="420" height="40" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
      <text x="250" y="256" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Platform Layer</text>
      <text x="440" y="256" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">AWS, GCP, Kubernetes</text>
    </svg>
  </div>
</body>
</html>
