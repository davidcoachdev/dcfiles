<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editorial Diagrams Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #faf7f2;
      --ink: #1c1917;
      --muted: #57534e;
      --accent: #b5523a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Geist', sans-serif;
      background: var(--paper);
      color: var(--ink);
      padding: 40px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--muted);
      margin-bottom: 40px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .card {
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .card p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .card iframe {
      width: 100%;
      height: 180px;
      border: 1px solid rgba(28,25,23,0.08);
      border-radius: 4px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      padding: 8px 16px;
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
    }
    .tab.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
  </style>
</head>
<body>
  <h1>Editorial Diagrams</h1>
  <p class="subtitle">13 diagram types for documentation and blog</p>
  
  <div class="tabs">
    <button class="tab active" onclick="filter('all')">All</button>
    <button class="tab" onclick="filter('light')">Light</button>
    <button class="tab" onclick="filter('dark')">Dark</button>
  </div>
  
  <div class="gallery">
    <div class="card">
      <h2>Architecture</h2>
      <p>System overviews, data-flow</p>
      <iframe src="example-architecture.html"></iframe>
    </div>
  </div>
  
  <script>
    function filter(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
