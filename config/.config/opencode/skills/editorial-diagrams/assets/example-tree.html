<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tree - Org Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917; --muted: #57534e; --accent: #b5523a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', sans-serif; background: var(--paper); color: var(--ink); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 7px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 24px; }
    .diagram-container { background: var(--paper-2); border: 1px solid rgba(28,25,23,0.12); border-radius: 8px; padding: 24px; }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">TREE</p>
  <h1>Organization Structure</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 450 280" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#57534e"/></marker></defs>
      <rect width="100%" height="100%" fill="#f2ede4"/>
      
      <rect x="175" y="20" width="100" height="40" rx="6" fill="#1c1917"/>
      <text x="225" y="46" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">CEO</text>
      
      <line x1="225" y1="60" x2="225" y2="90" stroke="#57534e" stroke-width="1"/>
      <line x1="225" y1="90" x2="100" y2="90" stroke="#57534e" stroke-width="1"/>
      <line x1="225" y1="90" x2="225" y2="90" stroke="#57534e" stroke-width="1"/>
      <line x1="225" y1="90" x2="350" y2="90" stroke="#57534e" stroke-width="1"/>
      <line x1="100" y1="90" x2="100" y2="110" stroke="#57534e" stroke-width="1"/>
      <line x1="350" y1="90" x2="350" y2="110" stroke="#57534e" stroke-width="1"/>
      
      <rect x="50" y="110" width="100" height="40" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="100" y="136" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">CTO</text>
      
      <rect x="200" y="110" width="100" height="40" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="250" y="136" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">CFO</text>
      
      <rect x="300" y="110" width="100" height="40" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <text x="350" y="136" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">COO</text>
      
      <line x1="100" y1="150" x2="100" y2="170" stroke="#57534e" stroke-width="1"/>
      <line x1="100" y1="170" x2="50" y2="170" stroke="#57534e" stroke-width="1"/>
      <line x1="100" y1="170" x2="150" y2="170" stroke="#57534e" stroke-width="1"/>
      <line x1="50" y1="170" x2="50" y2="190" stroke="#57534e" stroke-width="1"/>
      <line x1="150" y1="170" x2="150" y2="190" stroke="#57534e" stroke-width="1"/>
      
      <rect x="20" y="190" width="60" height="30" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="50" y="210" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Eng</text>
      
      <rect x="80" y="190" width="60" height="30" rx="4" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="110" y="210" fill="#1c1917" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Product</text>
      
      <rect x="120" y="190" width="60" height="30" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="150" y="210" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Design</text>
      
      <rect x="320" y="190" width="60" height="30" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="350" y="210" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Ops</text>
    </svg>
  </div>
</body>
</html>
