<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline - Product Roadmap</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917; --muted: #57534e; --accent: #b5523a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 7px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 24px; }
    .diagram-container { background: var(--paper-2); border: 1px solid rgba(28,25,23,0.12); border-radius: 8px; padding: 24px; overflow-x: auto; }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">TIMELINE</p>
  <h1>2025 Product Roadmap</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#57534e"/></marker></defs>
      <rect width="100%" height="100%" fill="#f2ede4"/>
      
      <line x1="60" y1="60" x2="660" y2="60" stroke="#1c1917" stroke-width="2"/>
      <line x1="60" y1="55" x2="60" y2="65" stroke="#1c1917" stroke-width="2"/>
      <line x1="660" y1="55" x2="660" y2="65" stroke="#1c1917" stroke-width="2"/>
      
      <text x="60" y="45" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Q1</text>
      <text x="220" y="45" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Q2</text>
      <text x="380" y="45" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Q3</text>
      <text x="540" y="45" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Q4</text>
      <text x="660" y="45" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">2026</text>
      
      <circle cx="120" cy="60" r="16" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1.5"/>
      <text x="120" y="64" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">v2.0</text>
      <rect x="80" y="90" width="80" height="28" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="120" y="108" fill="#1c1917" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">Auth Rewrite</text>
      
      <circle cx="260" cy="60" r="16" fill="#fff" stroke="#1c1917" stroke-width="1.5"/>
      <text x="260" y="64" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">v2.1</text>
      <rect x="220" y="90" width="80" height="28" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="260" y="108" fill="#1c1917" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">API v3</text>
      
      <circle cx="380" cy="60" r="16" fill="#fff" stroke="#1c1917" stroke-width="1.5"/>
      <text x="380" y="64" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">v2.2</text>
      <rect x="340" y="90" width="80" height="28" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="380" y="108" fill="#1c1917" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">Dashboard</text>
      
      <circle cx="500" cy="60" r="16" fill="#fff" stroke="#1c1917" stroke-width="1.5"/>
      <text x="500" y="64" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">v3.0</text>
      <rect x="460" y="90" width="80" height="28" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="500" y="108" fill="#1c1917" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">Mobile SDK</text>
      
      <circle cx="620" cy="60" r="16" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
      <text x="620" y="64" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">v3.1</text>
      <rect x="580" y="90" width="80" height="28" rx="4" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="0.8"/>
      <text x="620" y="108" fill="#57534e" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">Enterprise</text>
      
      <line x1="60" y1="150" x2="660" y2="150" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
      <text x="60" y="170" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.1em">PHASES</text>
      
      <rect x="60" y="180" width="140" height="36" rx="4" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="0.8"/>
      <text x="130" y="202" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Foundation</text>
      
      <rect x="220" y="180" width="140" height="36" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="290" y="202" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Growth</text>
      
      <rect x="380" y="180" width="140" height="36" rx="4" fill="#fff" stroke="#1c1917" stroke-width="0.8"/>
      <text x="450" y="202" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Scale</text>
      
      <rect x="540" y="180" width="140" height="36" rx="4" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="0.8"/>
      <text x="610" y="202" fill="#1c1917" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Enterprise</text>
    </svg>
  </div>
</body>
</html>
