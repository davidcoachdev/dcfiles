<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ER Diagram - Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917; --muted: #57534e; --accent: #b5523a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 7px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 24px; }
    .diagram-container { background: var(--paper-2); border: 1px solid rgba(28,25,23,0.12); border-radius: 8px; padding: 24px; overflow-x: auto; }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <p class="eyebrow">ER / DATA MODEL</p>
  <h1>Blog Schema</h1>
  <div class="diagram-container">
    <svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#57534e"/></marker></defs>
      <rect width="100%" height="100%" fill="#f2ede4"/>
      
      <rect x="20" y="20" width="140" height="120" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <rect x="20" y="20" width="140" height="24" rx="6" fill="#1c1917"/>
      <text x="90" y="37" fill="#faf7f2" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">User</text>
      <line x1="20" y1="44" x2="160" y2="44" stroke="#1c1917" stroke-width="1"/>
      <text x="28" y="60" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">id <tspan fill="#b5523a">PK</tspan></text>
      <text x="28" y="76" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">email</text>
      <text x="28" y="92" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">name</text>
      <text x="28" y="108" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">created_at</text>
      <text x="28" y="124" fill="#57534e" font-size="8" font-style="italic" font-family="'Geist Mono', monospace">password_hash</text>
      
      <rect x="220" y="20" width="140" height="120" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <rect x="220" y="20" width="140" height="24" rx="6" fill="#1c1917"/>
      <text x="290" y="37" fill="#faf7f2" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Post</text>
      <line x1="220" y1="44" x2="360" y2="44" stroke="#1c1917" stroke-width="1"/>
      <text x="228" y="60" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">id <tspan fill="#b5523a">PK</tspan></text>
      <text x="228" y="76" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">title</text>
      <text x="228" y="92" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">body</text>
      <text x="228" y="108" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">user_id <tspan fill="#57534e">FK</tspan></text>
      <text x="228" y="124" fill="#57534e" font-size="8" font-style="italic" font-family="'Geist Mono', monospace">published_at</text>
      
      <rect x="420" y="20" width="140" height="100" rx="6" fill="#fff" stroke="#1c1917" stroke-width="1"/>
      <rect x="420" y="20" width="140" height="24" rx="6" fill="#1c1917"/>
      <text x="490" y="37" fill="#faf7f2" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Comment</text>
      <line x1="420" y1="44" x2="560" y2="44" stroke="#1c1917" stroke-width="1"/>
      <text x="428" y="60" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">id <tspan fill="#b5523a">PK</tspan></text>
      <text x="428" y="76" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">body</text>
      <text x="428" y="92" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace">post_id <tspan fill="#57534e">FK</tspan></text>
      <text x="428" y="108" fill="#57534e" font-size="8" font-style="italic" font-family="'Geist Mono', monospace">user_id <tspan fill="#57534e">FK</tspan></text>
      
      <path d="M90 140 L90 160 L290 160 L290 150" stroke="#57534e" stroke-width="1"/>
      <polygon points="285,147 290,155 295,147" fill="#57534e"/>
      <text x="190" y="170" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">1:N</text>
      
      <path d="M290 140 L350 80 L490 80 L490 55" stroke="#57534e" stroke-width="1"/>
      <polygon points="485,52 490,60 495,52" fill="#57534e"/>
      <text x="420" y="75" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">1:N</text>
    </svg>
  </div>
</body>
</html>
