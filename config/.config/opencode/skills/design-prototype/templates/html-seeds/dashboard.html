<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    :root {
      /* CSS tokens injected by agent */
      --bg: oklch(98% 0 0);
      --surface: oklch(100% 0 0);
      --fg: oklch(20% 0 0);
      --muted: oklch(50% 0 0);
      --border: oklch(90% 0 0);
      --accent: oklch(60% 0.15 250);
      --font-sans: 'Inter', -apple-system, sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-sans);
      color: var(--fg);
      background: var(--bg);
    }
    
    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    
    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px;
    }
    
    .sidebar h2 {
      font-size: 1.25rem;
      margin-bottom: 32px;
    }
    
    .nav-item {
      display: block;
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--fg);
      transition: background 0.2s;
      min-height: 44px;
    }
    
    .nav-item:hover {
      background: var(--bg);
    }
    
    .nav-item:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    
    .nav-item.active {
      background: var(--accent);
      color: white;
    }
    
    /* Main Content */
    .main {
      padding: 24px;
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    
    .header h1 {
      font-size: 2rem;
    }
    
    .user-menu {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      min-height: 44px;
    }
    
    .user-menu:hover {
      background: var(--bg);
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: var(--surface);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    
    .stat-card h3 {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    
    /* Content Card */
    .content-card {
      background: var(--surface);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    
    .content-card h2 {
      font-size: 1.5rem;
      margin-bottom: 16px;
    }
    
    /* Responsive */
    @media (min-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    
    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }
      
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Dashboard</h2>
      <nav aria-label="Main navigation">
        <a href="#" class="nav-item active" aria-current="page">Home</a>
        <a href="#" class="nav-item">Projects</a>
        <a href="#" class="nav-item">Team</a>
        <a href="#" class="nav-item">Analytics</a>
        <a href="#" class="nav-item">Settings</a>
      </nav>
    </aside>
    
    <!-- Main Content -->
    <div class="main">
      <!-- Header -->
      <header class="header">
        <h1>Welcome back, User</h1>
        <button class="user-menu" aria-label="User menu">Profile</button>
      </header>
      
      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Users</h3>
          <p class="stat-value">1,234</p>
        </div>
        <div class="stat-card">
          <h3>Active Projects</h3>
          <p class="stat-value">42</p>
        </div>
        <div class="stat-card">
          <h3>Revenue</h3>
          <p class="stat-value">$12.5K</p>
        </div>
        <div class="stat-card">
          <h3>Growth</h3>
          <p class="stat-value">+23%</p>
        </div>
      </div>
      
      <!-- Recent Activity -->
      <div class="content-card">
        <h2>Recent Activity</h2>
        <p style="color: var(--muted);">Your recent projects and updates will appear here.</p>
      </div>
      
      <!-- Quick Actions -->
      <div class="content-card">
        <h2>Quick Actions</h2>
        <p style="color: var(--muted);">Common tasks and shortcuts for faster workflow.</p>
      </div>
    </div>
  </div>
</body>
</html>
