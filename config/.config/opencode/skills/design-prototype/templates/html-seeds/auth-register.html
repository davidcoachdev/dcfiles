<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <style>
    :root {
      --bg: oklch(98% 0 0);
      --surface: oklch(100% 0 0);
      --fg: oklch(20% 0 0);
      --muted: oklch(50% 0 0);
      --border: oklch(90% 0 0);
      --accent: oklch(60% 0.15 250);
      --font-sans: 'Inter', -apple-system, sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-sans);
      color: var(--fg);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    
    .auth-card {
      background: var(--surface);
      padding: 48px;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 400px;
    }
    
    .auth-card h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    
    .auth-card .subtitle {
      color: var(--muted);
      margin-bottom: 32px;
    }
    
    .form-field {
      margin-bottom: 24px;
    }
    
    .form-field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    .form-field input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    .form-field input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      min-height: 44px;
    }
    
    .btn-primary:hover {
      opacity: 0.9;
    }
    
    .btn-primary:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--muted);
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    
    .divider span {
      padding: 0 16px;
    }
    
    .social-buttons {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .btn-social {
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      min-height: 44px;
    }
    
    .btn-social:hover {
      background: var(--bg);
    }
    
    .btn-social:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    
    .footer-link {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
    }
    
    .footer-link a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .footer-link a:hover {
      text-decoration: underline;
    }
    
    .terms {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 16px;
      line-height: 1.5;
    }
    
    .terms a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .terms a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1>Create Account</h1>
    <p class="subtitle">Get started with your free account today.</p>
    
    <div class="social-buttons">
      <button class="btn-social" aria-label="Sign up with Google">
        Continue with Google
      </button>
      <button class="btn-social" aria-label="Sign up with GitHub">
        Continue with GitHub
      </button>
    </div>
    
    <div class="divider">
      <span>or</span>
    </div>
    
    <form>
      <div class="form-field">
        <label for="name">Full Name</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          placeholder="John Doe"
          required
          aria-required="true"
        >
      </div>
      
      <div class="form-field">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="you@example.com"
          required
          aria-required="true"
        >
      </div>
      
      <div class="form-field">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="••••••••"
          required
          aria-required="true"
          minlength="8"
        >
      </div>
      
      <button type="submit" class="btn-primary">Create Account</button>
      
      <p class="terms">
        By creating an account, you agree to our 
        <a href="#terms">Terms of Service</a> and 
        <a href="#privacy">Privacy Policy</a>.
      </p>
    </form>
    
    <p class="footer-link">
      Already have an account? <a href="prototype-login.html">Sign in</a>
    </p>
  </div>
</body>
</html>
