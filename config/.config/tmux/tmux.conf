# ============================================
# PREFIX & NAVIGATION
# ============================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ============================================
# COPY MODE
# ============================================
# Vim mode
set -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Copy mode mac/linux
if-shell 'uname | grep -q Darwin' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"'

# ============================================
# RESIZE with Alt + Arrow
# ============================================
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5

# ============================================
# SWITCH WINDOWS with Alt + Number
# ============================================
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# ============================================
# SWITCH SESSION
# ============================================
bind N switch-client -n

# Icons for plugins
set -g @online_icon "ok"
set -g @offline_icon "offline!"

# ============================================
# FLOATING WINDOW (M-g)
# ============================================
bind-key -n M-g if-shell -F '#{==:#{session_name},Dc_Dev}' {
  detach-client
} {
  display-popup -E "tmux new-session -A -s Dc_Dev"
}

# ============================================
# PLUGINS
# ============================================
# Carga TPM
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
# Tested options for TMUX compatibility
set -g @plugin 'tmux-plugins/tmux-sensible'
# Tmux Resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Tmux Continuum (auto-save)
set -g @plugin 'tmux-plugins/tmux-continuum'
# Tmux Navigation
set -g @plugin 'christoomey/vim-tmux-navigator'
# Tmux Which Key
set -g @plugin 'alexwforsythe/tmux-which-key'
# Tmux Sidebar
set -g @plugin 'tmux-plugins/tmux-sidebar'
# Clipboard management
set -g @plugin 'tmux-plugins/tmux-yank'
# Online status
set -g @plugin 'tmux-plugins/tmux-online-status'

# ============================================
# SYNC PANES (C-a S)
# ============================================
bind S setw synchronize-panes \; run-shell "tmux display-message 'Sincronización de paneles #{?pane_synchronized,activada,desactivada}'" \; run-shell 'sleep 3 && tmux display-message ""'

# ============================================
# Terminal & key handling 
# ============================================
set -g default-terminal "tmux-256color"
set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm*:Tc"
set -s extended-keys off

# ============================================
# UKIYO PLUGIN + KANAGAWA COLORS
# ============================================
set -g @plugin 'Nybkox/tmux-kanagawa'
set -g @kanagawa-theme "dragon"

# Background (negro profundo -> sumi_ink_0)
set -g @ukiyo-color-bg-bar "sumi_ink_0"

# Pane background (sumi_ink_1)
set -g @ukiyo-color-bg-pane "sumi_ink_1"

# Texto principal (fuji_white - más claro)
set -g @ukiyo-color-text "fuji_white"

# Highlight activo (dragon_red - rojo primario)
set -g @ukiyo-color-highlight "dragon_red"

# Selection (samurai_red)
set -g @ukiyo-color-selection "samurai_red"

# Accent (autumn_red)
set -g @ukiyo-color-accent "autumn_red"

# Info (peach_red)
set -g @ukiyo-color-info "peach_red"

# Notice (autumn_red)
set -g @ukiyo-color-notice "autumn_red"

# Error (samurai_red - rojo intenso)
set -g @ukiyo-color-error "samurai_red"

# Muted (fuji_gray)
set -g @ukiyo-color-muted "fuji_gray"

# Alert (dragon_red)
set -g @ukiyo-color-alert "dragon_red"

# Ignore window colors (transparent bg)
set -g @ukiyo-ignore-window-colors true

# ============================================
# KANAGAWA PLUGIN CONFIG
# ============================================
# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage, network, network-bandwidth, network-ping, ssh-session, attached-clients, network-vpn, weather, time, mpc, spotify-tui, playerctl, kubernetes-context, synchronize-panes
set -g @kanagawa-plugins "battery cpu-usage ram-usage time"

# set -g @dracula-show-right-sep
set -g @kanagawa-show-powerline true
set -g @kanagawa-show-timezone true

# Transparent Background
set -g @kanagawa-ignore-window-colors true

# Resurrect config
set -g @resurrect-capture-pane-contents 'v'
set -g @resurrect-save-on-exit 'on'
set -g @resurrect-restore-on-startup 'on'

# ============================================
# STATUS BAR
# ============================================
set -g status-position top
set -g status-interval 0
set -g status-left-length 100
set -g status-right-length 100

# Sync panes indicator en status right
setw -g monitor-silence 1
set -g status-right '#{?pane_synchronized,#[fg=dragon_red]🔗 ,} - Online: #{online_status} | %a %h-%d %H:%M '
set -g status-interval 5

# ============================================
# YANK config
# ============================================
set -g @yank_with_mouse on
set -g @yank_selection_mouse 'clipboard'

# Kill all sessions except current
bind K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# Keymaps
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind d split-window -v -c "#{pane_current_path}"

# ============================================
# MOUSE & PERFORMANCE
# ============================================
set -g mouse on
set -sg escape-time 0

# Fix index
set -g base-index 1
setw -g pane-base-index 1

# TPM init
run '~/.config/tmux/plugins/tpm/tpm'